plugins {
    id 'com.android.library'
}

android {
    namespace 'com.example.namespace'

    externalNativeBuild {
        ndkBuild {
            path("jni/Android.mk")
        }
    }
    defaultConfig {
        externalNativeBuild {
            ndkBuild {
                arguments "APP_STL=c++_static"
            }
        }
    }
    ndkVersion '26.1.10909125'
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    buildToolsVersion '36.1.0'
    compileSdk 34
}

import org.apache.tools.ant.filters.FixCrLfFilter
import java.security.MessageDigest

def outDir = file("${project.buildDir}/outputs/magisk")
def magiskModuleId = 'AAAIjt'
def moduleName = 'AAAIjt'
def moduleVersion = '3.1.0'
def moduleVersionCode = 300
def moduleAuthor = 'zheng'
def moduleDescription = '无痕注入so和dex'

afterEvaluate {
    android.libraryVariants.forEach { variant ->
        def variantCapped = variant.name.capitalize()
        def variantLowered = variant.name.toLowerCase()

        def zipName = "${magiskModuleId.replace('_', '-')}-${moduleVersion}-${variantLowered}.zip"
        def magiskDir = file("$outDir/magisk_module_$variantLowered")

        task("prepareMagiskFiles${variantCapped}", type: Sync) {
            dependsOn("assemble$variantCapped")

            duplicatesStrategy = DuplicatesStrategy.INCLUDE

            def templatePath = "$rootDir/template/magisk_module"

            into magiskDir
            from(templatePath) {
                exclude 'module.prop'
            }
            from(templatePath) {
                include 'module.prop'
                expand([
                        id         : magiskModuleId,
                        name       : moduleName,
                        version    : moduleVersion,
                        versionCode: moduleVersionCode.toString(),
                        author     : moduleAuthor,
                        description: moduleDescription,
                ])
                filter(FixCrLfFilter.class,
                        eol: FixCrLfFilter.CrLf.newInstance("lf"))
            }
            from("${templatePath}/config.json")
            from("${templatePath}/modules") {
                into 'modules'
            }
            from("$buildDir/intermediates/stripped_native_libs/$variantLowered/out/lib/arm64-v8a/libinject.so") {
                into 'zygisk'
                rename { 'arm64-v8a.so' }
            }
            from("$buildDir/intermediates/stripped_native_libs/$variantLowered/out/lib/armeabi-v7a/libinject.so") {
                into 'zygisk'
                rename { 'armeabi-v7a.so' }
            }
            from("$buildDir/intermediates/stripped_native_libs/$variantLowered/out/lib/x86/libinject.so") {
                into 'zygisk'
                rename { 'x86.so' }
            }
            from("$buildDir/intermediates/stripped_native_libs/$variantLowered/out/lib/x86_64/libinject.so") {
                into 'zygisk'
                rename { 'x86_64.so' }
            }
            doLast {
                fileTree("$magiskDir").visit { f ->
                    if (f.directory) return
                    if (f.file.name == '.gitattributes' || f.file.name.endsWith('.sha256sum')) return

                    def md = MessageDigest.getInstance("SHA-256")
                    f.file.eachByte 4096, { bytes, size ->
                        md.update(bytes, 0, size)
                    }
                    file(f.file.path + ".sha256sum").text = md.digest().encodeHex()
                }
            }
        }

        task("zip${variantCapped}", type: Zip) {
            dependsOn("prepareMagiskFiles${variantCapped}")
            from magiskDir
            archiveFileName.set(zipName)
            destinationDirectory.set(outDir)
        }

        task("push${variantCapped}", type: Exec) {
            dependsOn("zip${variantCapped}")
            workingDir outDir
            commandLine android.adbExecutable, "push", zipName, "/data/local/tmp/"
        }

        task("flash${variantCapped}", type: Exec) {
            dependsOn("push${variantCapped}")
            commandLine android.adbExecutable, "shell", "su", "-c",
                    "magisk --install-module /data/local/tmp/${zipName}"
        }

        task("flashAndReboot${variantCapped}", type: Exec) {
            dependsOn("flash${variantCapped}")
            commandLine android.adbExecutable, "shell", "reboot"
        }

        def zipTaskName = "zip${variantCapped}"
        variant.assembleProvider.get().finalizedBy(zipTaskName)
    }
}